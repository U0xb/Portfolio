<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Portfolio</title>

    <link rel="icon" type="image/svg+xml" href="favicon-shell.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>
    <div class="terminal-wrap">
        <div class="terminal-window">
            <div class="terminal-titlebar">
                <div class="terminal-dots">
                    <span class="dot-red"></span>
                    <span class="dot-yellow"></span>
                    <span class="dot-green"></span>
                </div>
                <span class="terminal-title">// ACCÈS SÉCURISÉ</span>
                <span class="terminal-title-right">r.saraoui</span>
            </div>
            <div class="terminal-body" id="terminal-body">
                <div id="terminal-output"></div>
                <div class="terminal-input-line" id="input-line">
                    <span class="terminal-prompt" id="terminal-prompt"></span>
                    <input
                        id="terminal-input"
                        type="text"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        aria-label="terminal input"
                    >
                </div>
            </div>
        </div>
        <div class="terminal-back">
            <a href="index.html">← Retour au portfolio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="admin-auth.js"></script>

</body>
</html>
