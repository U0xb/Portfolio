<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Styles spécifiques au dashboard */
        .dashboard-header {
        position: relative; /* Changé de sticky à relative */
        z-index: 100;
        background: var(--nav-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        padding: 2rem;
        margin-top: 80px; /* Compense le header fixe en haut */
        margin-bottom: 2rem; /* Espacement avec la section suivante */
    }


        .dashboard-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .logout-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .dashboard-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem 4rem;
}

    .dashboard-section {
        margin-bottom: 3rem;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 2rem;
        transition: all 0.3s ease;
}

        [data-theme="dark"] .dashboard-section {
            background: rgba(20, 20, 20, 0.6);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        :root:not([data-theme="dark"]) .dashboard-section {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .dashboard-section:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-primary);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .section-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .item-list {
            display: grid;
            gap: 1.5rem;
        }

        .item-card {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .item-card:hover {
            transform: translateX(8px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .item-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .item-card p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .item-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        [data-theme="dark"] .modal-content {
            background: rgba(20, 20, 20, 0.95);
        }

        :root:not([data-theme="dark"]) .modal-content {
            background: rgba(255, 255, 255, 0.95);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-modal {
            background: transparent;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .close-modal:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            min-height: 50px;
            transition: all 0.3s ease;
        }

        .tags-input:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .tag {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .tag button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
            transition: transform 0.2s ease;
        }

        .tag button:hover {
            transform: scale(1.2);
        }

        .success-message,
        .error-message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
            font-weight: 600;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.125rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .dashboard-header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .dashboard-header h1 {
                font-size: 1.5rem;
            }

            .dashboard-section {
                padding: 1.5rem;
            }

            .section-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .item-actions {
                flex-direction: column;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header avec navigation -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="brand">RD</a>
            <nav class="site-nav">
                <a href="index.html">Retour au portfolio</a>
            </nav>
        </div>
    </header>

    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <div class="dashboard-header-content">
            <h1>🎨 Dashboard Portfolio</h1>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard-content">
        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <!-- Hero Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>📢 Section Hero</h2>
            </div>
            <div id="heroForm">
                <input type="hidden" id="heroId">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="heroTitle" placeholder="Créons des expériences web rapides, élégantes et utiles.">
                </div>
                <div class="form-group">
                    <label>Sous-titre</label>
                    <textarea id="heroSubtitle" rows="3" placeholder="Étudiant en BTS SIO..."></textarea>
                </div>
                <button class="btn btn-success" onclick="saveHero()">💾 Enregistrer</button>
            </div>
        </div>

        <!-- Projects Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>🚀 Projets</h2>
                <button class="btn primary" onclick="openProjectModal()">➕ Ajouter un projet</button>
            </div>
            <div class="item-list" id="projectsList"></div>
        </div>

        <!-- Skills Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>💡 Compétences</h2>
                <button class="btn primary" onclick="openSkillModal()">➕ Ajouter une compétence</button>
            </div>
            <div class="item-list" id="skillsList"></div>
        </div>

        <!-- About Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>👤 À propos</h2>
            </div>
            <div id="aboutForm">
                <input type="hidden" id="aboutId">
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="aboutDescription" rows="6" placeholder="Parlez de vous..."></textarea>
                </div>
                <div class="form-group">
                    <label>Tags (appuyez sur Entrée pour ajouter)</label>
                    <div class="tags-input" id="aboutTagsContainer" onclick="focusAboutTagInput()">
                        <input type="text" id="aboutTagInput" style="border:none;flex:1;outline:none;background:transparent;color:var(--text-primary);" onkeypress="addAboutTag(event)">
                    </div>
                </div>
                <button class="btn btn-success" onclick="saveAbout()">💾 Enregistrer</button>
            </div>
        </div>

        <!-- Experience Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>💼 Expériences</h2>
                <button class="btn primary" onclick="openExperienceModal()">➕ Ajouter une expérience</button>
            </div>
            <div class="item-list" id="experienceList"></div>
        </div>

        <!-- Education Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>🎓 Formation</h2>
                <button class="btn primary" onclick="openEducationModal()">➕ Ajouter une formation</button>
            </div>
            <div class="item-list" id="educationList"></div>
        </div>

        <!-- Contact Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>📧 Contact</h2>
            </div>
            <div id="contactForm">
                <input type="hidden" id="contactId">
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="contactPhone" placeholder="06 06 49 66 18">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="contactEmail" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" id="contactLinkedin" placeholder="https://www.linkedin.com/in/...">
                </div>
                <button class="btn btn-success" onclick="saveContact()">💾 Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="projectModalTitle">Ajouter un projet</h3>
                <button class="close-modal" onclick="closeProjectModal()">×</button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label>Titre*</label>
                    <input type="text" id="projectTitle" required>
                </div>
                <div class="form-group">
                    <label>Description*</label>
                    <textarea id="projectDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label>Lien</label>
                    <input type="url" id="projectLink" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="projectImageUrl" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Tags (appuyez sur Entrée pour ajouter)</label>
                    <div class="tags-input" id="projectTagsContainer" onclick="focusTagInput()">
                        <input type="text" id="projectTagInput" style="border:none;flex:1;outline:none;background:transparent;color:var(--text-primary);" onkeypress="addProjectTag(event)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="projectOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">💾 Enregistrer</button>
            </form>
        </div>
    </div>

    <!-- Skill Modal -->
    <div id="skillModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="skillModalTitle">Ajouter une compétence</h3>
                <button class="close-modal" onclick="closeSkillModal()">×</button>
            </div>
            <form id="skillForm">
                <input type="hidden" id="skillId">
                <div class="form-group">
                    <label>Nom*</label>
                    <input type="text" id="skillName" required>
                </div>
                <div class="form-group">
                    <label>Valeur (0-100)*</label>
                    <input type="number" id="skillValue" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="skillOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">💾 Enregistrer</button>
            </form>
        </div>
    </div>

    <!-- Experience Modal -->
    <div id="experienceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="experienceModalTitle">Ajouter une expérience</h3>
                <button class="close-modal" onclick="closeExperienceModal()">×</button>
            </div>
            <form id="experienceForm">
                <input type="hidden" id="experienceId">
                <div class="form-group">
                    <label>Poste*</label>
                    <input type="text" id="experienceTitle" required>
                </div>
                <div class="form-group">
                    <label>Entreprise*</label>
                    <input type="text" id="experienceCompany" required>
                </div>
                <div class="form-group">
                    <label>Date*</label>
                    <input type="text" id="experienceDate" placeholder="septembre 2025 – Présent" required>
                </div>
                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="experienceLocation" placeholder="Rouen">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="experienceDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="experienceOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">💾 Enregistrer</button>
            </form>
        </div>
    </div>

    <!-- Education Modal -->
    <div id="educationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="educationModalTitle">Ajouter une formation</h3>
                <button class="close-modal" onclick="closeEducationModal()">×</button>
            </div>
            <form id="educationForm">
                <input type="hidden" id="educationId">
                <div class="form-group">
                    <label>Diplôme*</label>
                    <input type="text" id="educationTitle" required>
                </div>
                <div class="form-group">
                    <label>Établissement*</label>
                    <input type="text" id="educationInstitution" required>
                </div>
                <div class="form-group">
                    <label>Date*</label>
                    <input type="text" id="educationDate" placeholder="octobre 2024 – juillet 2026" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="educationDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="educationOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">💾 Enregistrer</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script src="admin-dashboard.js"></script>
</body>
</html>
