<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles de base (thème, variables, backgrounds) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Styles spécifiques admin dashboard -->
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <!-- Header avec navigation -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="brand">RD</a>
            <nav class="site-nav">
                <a href="index.html">Retour au portfolio</a>
            </nav>
        </div>
    </header>

    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <div class="dashboard-header-content">
            <h1>
                <svg style="width:28px;height:28px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM14 12a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7zM4 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3z"/>
                </svg>
                Dashboard Portfolio
            </h1>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard-content">
        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <!-- Hero Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                    </svg>
                    Section Hero
                </h2>
            </div>
            <div id="heroForm">
                <input type="hidden" id="heroId">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="heroTitle" placeholder="Créons des expériences web rapides, élégantes et utiles.">
                </div>
                <div class="form-group">
                    <label>Sous-titre</label>
                    <textarea id="heroSubtitle" rows="3" placeholder="Étudiant en BTS SIO..."></textarea>
                </div>
                <button class="btn btn-success" onclick="saveHero()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </div>
        </div>

        <!-- Projects Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
                    </svg>
                    Projets
                </h2>
                <button class="btn primary" onclick="openProjectModal()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Ajouter un projet
                </button>
            </div>
            <div class="item-list" id="projectsList"></div>
        </div>

        <!-- Skills Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                    Compétences
                </h2>
                <button class="btn primary" onclick="openSkillModal()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Ajouter une compétence
                </button>
            </div>
            <div class="item-list" id="skillsList"></div>
        </div>

        <!-- About Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    À propos
                </h2>
            </div>
            <div id="aboutForm">
                <input type="hidden" id="aboutId">
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="aboutDescription" rows="6" placeholder="Parlez de vous..."></textarea>
                </div>
                <div class="form-group">
                    <label>Tags (appuyez sur Entrée pour ajouter)</label>
                    <div class="tags-input" id="aboutTagsContainer" onclick="focusAboutTagInput()">
                        <input type="text" id="aboutTagInput" style="border:none;flex:1;outline:none;background:transparent;color:var(--text-primary);" onkeypress="addAboutTag(event)">
                    </div>
                </div>
                <button class="btn btn-success" onclick="saveAbout()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </div>
        </div>

        <!-- Experience Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Expériences
                </h2>
                <button class="btn primary" onclick="openExperienceModal()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Ajouter une expérience
                </button>
            </div>
            <div class="item-list" id="experienceList"></div>
        </div>

        <!-- Education Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/>
                    </svg>
                    Formation
                </h2>
                <button class="btn primary" onclick="openEducationModal()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Ajouter une formation
                </button>
            </div>
            <div class="item-list" id="educationList"></div>
        </div>

        <!-- Contact Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>
                    <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Contact
                </h2>
            </div>
            <div id="contactForm">
                <input type="hidden" id="contactId">
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="contactPhone" placeholder="06 06 49 66 18">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="contactEmail" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" id="contactLinkedin" placeholder="https://www.linkedin.com/in/...">
                </div>
                <button class="btn btn-success" onclick="saveContact()">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="projectModalTitle">Ajouter un projet</h3>
                <button class="close-modal" onclick="closeProjectModal()">×</button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label>Titre*</label>
                    <input type="text" id="projectTitle" required>
                </div>
                <div class="form-group">
                    <label>Description*</label>
                    <textarea id="projectDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label>Lien</label>
                    <input type="url" id="projectLink" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="projectImageUrl" placeholder="https://...">
                </div>
                <!-- NOUVEAU CHAMP POUR LE PDF -->
                <div class="form-group">
                    <label>Fichier PDF du projet</label>
                    <input type="file" id="projectPdfFile" accept=".pdf">
                    <small style="color: #999; font-size: 13px;">Sélectionnez un fichier PDF à uploader</small>
                    <div id="pdfUploadStatus" style="margin-top: 8px; font-size: 13px;"></div>
                </div>
                <div class="form-group">
                    <label>URL du PDF (généré automatiquement après upload)</label>
                    <input type="url" id="projectPdfUrl" placeholder="Sera rempli après l'upload" readonly>
                </div>                
                <div class="form-group">
                    <label>Tags (appuyez sur Entrée pour ajouter)</label>
                    <div class="tags-input" id="projectTagsContainer" onclick="focusTagInput()">
                        <input type="text" id="projectTagInput" style="border:none;flex:1;outline:none;background:transparent;color:var(--text-primary);" onkeypress="addProjectTag(event)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="projectOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </form>
        </div>
    </div>

    <!-- Skill Modal -->
    <div id="skillModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="skillModalTitle">Ajouter une compétence</h3>
                <button class="close-modal" onclick="closeSkillModal()">×</button>
            </div>
            <form id="skillForm">
                <input type="hidden" id="skillId">
                <div class="form-group">
                    <label>Nom*</label>
                    <input type="text" id="skillName" required>
                </div>
                <div class="form-group">
                    <label>Valeur (0-100)*</label>
                    <input type="number" id="skillValue" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="skillOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </form>
        </div>
    </div>

    <!-- Experience Modal -->
    <div id="experienceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="experienceModalTitle">Ajouter une expérience</h3>
                <button class="close-modal" onclick="closeExperienceModal()">×</button>
            </div>
            <form id="experienceForm">
                <input type="hidden" id="experienceId">
                <div class="form-group">
                    <label>Poste*</label>
                    <input type="text" id="experienceTitle" required>
                </div>
                <div class="form-group">
                    <label>Entreprise*</label>
                    <input type="text" id="experienceCompany" required>
                </div>
                <div class="form-group">
                    <label>Date*</label>
                    <input type="text" id="experienceDate" placeholder="septembre 2025 – Présent" required>
                </div>
                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="experienceLocation" placeholder="Rouen">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="experienceDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="experienceOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </form>
        </div>
    </div>

    <!-- Education Modal -->
    <div id="educationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="educationModalTitle">Ajouter une formation</h3>
                <button class="close-modal" onclick="closeEducationModal()">×</button>
            </div>
            <form id="educationForm">
                <input type="hidden" id="educationId">
                <div class="form-group">
                    <label>Diplôme*</label>
                    <input type="text" id="educationTitle" required>
                </div>
                <div class="form-group">
                    <label>Établissement*</label>
                    <input type="text" id="educationInstitution" required>
                </div>
                <div class="form-group">
                    <label>Date*</label>
                    <input type="text" id="educationDate" placeholder="octobre 2024 – juillet 2026" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="educationDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Ordre d'affichage</label>
                    <input type="number" id="educationOrder" value="0">
                </div>
                <button type="submit" class="btn btn-success">
                    <svg style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Enregistrer
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase UMD pour navigateur -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script src="admin-dashboard.js"></script>
</body>
</html>
